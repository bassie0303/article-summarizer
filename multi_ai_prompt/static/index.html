<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi AI Prompt</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── ヘッダー ── */
  header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  header h1 { font-size: 1.15rem; font-weight: 700; }
  header p  { font-size: .8rem; color: #666; }
  .history-btn {
    background: #f3f4f6;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: .85rem;
    cursor: pointer;
    color: #444;
    transition: background .2s;
    white-space: nowrap;
  }
  .history-btn:hover { background: #e5e7eb; }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

  /* ── プロンプト入力 ── */
  .prompt-box {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    margin-bottom: 16px;
  }
  .prompt-box textarea {
    width: 100%;
    border: 1.5px solid #d0d0d0;
    border-radius: 8px;
    padding: 12px;
    font-size: .95rem;
    resize: vertical;
    min-height: 90px;
    outline: none;
    font-family: inherit;
    transition: border-color .2s;
    line-height: 1.6;
  }
  .prompt-box textarea:focus { border-color: #6366f1; }

  /* ── モデル選択 ── */
  .model-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .model-item {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 180px;
  }
  .model-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-chatgpt { background: #10A37F; }
  .dot-gemini  { background: #4285F4; }
  .dot-claude  { background: #CC785C; }
  .model-item label { font-size: .78rem; color: #555; white-space: nowrap; }
  .model-item select {
    flex: 1;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: .82rem;
    outline: none;
    background: #fafafa;
  }

  /* ── アクション ── */
  .actions { display: flex; gap: 10px; margin-top: 12px; }
  #sendBtn {
    flex: 1;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, opacity .2s;
  }
  #sendBtn:hover:not(:disabled) { background: #4f46e5; }
  #sendBtn:disabled { opacity: .5; cursor: not-allowed; }
  #newBtn {
    background: #f3f4f6;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    padding: 12px 18px;
    font-size: .9rem;
    cursor: pointer;
    color: #555;
    transition: background .2s;
    white-space: nowrap;
  }
  #newBtn:hover { background: #e5e7eb; }

  /* ── 結果グリッド ── */
  .results {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 900px) { .results { grid-template-columns: 1fr; } }

  /* ── カード ── */
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #f0f0f0;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-header .title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: .92rem;
  }
  .model-tag {
    font-size: .72rem;
    background: #f3f4f6;
    color: #555;
    padding: 2px 8px;
    border-radius: 99px;
  }
  .card-btns { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .copy-btn {
    background: none;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: .75rem;
    cursor: pointer;
    color: #555;
    transition: background .15s;
    white-space: nowrap;
  }
  .copy-btn:hover { background: #f3f4f6; }

  .native-btn {
    background: none;
    border: 1px solid #6366f1;
    color: #6366f1;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: .75rem;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .native-btn:hover { background: #6366f1; color: #fff; }

  /* ── スレッド表示 ── */
  .card-thread {
    flex: 1;
    overflow-y: auto;
    max-height: 520px;
    min-height: 80px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .idle-msg { color: #aaa; font-style: italic; font-size: .88rem; }

  .msg { display: flex; flex-direction: column; gap: 4px; }

  .msg-role {
    font-size: .72rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .msg-user .msg-content {
    background: #f3f4f6;
    border-radius: 10px 10px 10px 2px;
    padding: 8px 12px;
    font-size: .88rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-ai .msg-content {
    font-size: .88rem;
    line-height: 1.7;
    word-break: break-word;
  }
  .msg-error .msg-content { color: #dc2626; }

  /* Markdown スタイル（スレッド内） */
  .msg-ai .msg-content h1,.msg-ai .msg-content h2,.msg-ai .msg-content h3 {
    margin: .6em 0 .3em; font-weight: 700;
  }
  .msg-ai .msg-content h2 { font-size: 1.05em; }
  .msg-ai .msg-content h3 { font-size: .98em; }
  .msg-ai .msg-content p  { margin-bottom: .5em; }
  .msg-ai .msg-content ul,.msg-ai .msg-content ol { padding-left: 1.4em; margin-bottom: .5em; }
  .msg-ai .msg-content li { margin-bottom: .2em; }
  .msg-ai .msg-content pre {
    background: #f6f8fa; border-radius: 6px;
    padding: 8px 10px; overflow-x: auto;
    font-size: .8em; margin-bottom: .5em;
  }
  .msg-ai .msg-content code {
    background: #f1f1f1; padding: 1px 5px;
    border-radius: 4px; font-size: .83em;
  }
  .msg-ai .msg-content pre code { background: none; padding: 0; }
  .msg-ai .msg-content blockquote {
    border-left: 3px solid #d0d0d0; padding-left: 10px;
    color: #666; margin-bottom: .5em;
  }
  .msg-ai .msg-content table { border-collapse: collapse; width: 100%; margin-bottom: .5em; }
  .msg-ai .msg-content th,.msg-ai .msg-content td {
    border: 1px solid #d0d0d0; padding: 4px 8px; font-size: .83em;
  }
  .msg-ai .msg-content th { background: #f6f8fa; }

  /* ローディング */
  .msg-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #888;
    font-size: .85rem;
    padding: 6px 0;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #e0e0e0;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 返信エリア ── */
  .card-reply {
    border-top: 1px solid #f0f0f0;
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .card-reply textarea {
    flex: 1;
    border: 1.5px solid #d0d0d0;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: .85rem;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    transition: border-color .2s;
    min-height: 56px;
    max-height: 120px;
  }
  .card-reply textarea:focus { border-color: #6366f1; }
  .reply-send-btn {
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s, opacity .2s;
    align-self: flex-end;
  }
  .reply-send-btn:hover:not(:disabled) { background: #4f46e5; }
  .reply-send-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── X文字数カウンター ── */
  .char-counter { padding: 6px 14px 10px; font-size: .75rem; display: none; }
  .char-counter .bar-wrap {
    background: #e5e7eb; border-radius: 99px;
    height: 4px; overflow: hidden; margin-bottom: 4px;
  }
  .char-counter .bar { height: 100%; border-radius: 99px; transition: width .3s, background .3s; }
  .char-counter .label { color: #666; }
  .char-counter .label.over { color: #dc2626; font-weight: 700; }

  /* ── 履歴モーダル ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 { font-size: 1rem; font-weight: 700; }
  .modal-close {
    background: none; border: none; font-size: 1.3rem;
    cursor: pointer; color: #888; line-height: 1;
    padding: 0 4px;
  }
  .modal-body { overflow-y: auto; flex: 1; padding: 12px; }

  .session-item {
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: background .15s, border-color .15s;
    margin-bottom: 6px;
  }
  .session-item:hover { background: #f3f4f6; }
  .session-item.active { border-color: #6366f1; background: #eef2ff; }
  .session-title { font-size: .9rem; font-weight: 600; margin-bottom: 3px; color: #1a1a1a; }
  .session-meta  { font-size: .75rem; color: #888; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🤖 Multi AI Prompt</h1>
    <p>ChatGPT・Gemini・Claude に一括送信</p>
  </div>
  <button class="history-btn" onclick="showHistory()">📋 履歴</button>
</header>

<div class="container">

  <!-- プロンプト入力 -->
  <div class="prompt-box">
    <textarea id="prompt" placeholder="ここにプロンプトを入力してください..."></textarea>

    <div class="model-row">
      <div class="model-item">
        <span class="dot dot-chatgpt"></span>
        <label>ChatGPT</label>
        <select id="m-chatgpt">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="o3">o3</option>
          <option value="o4-mini">o4-mini</option>
        </select>
      </div>
      <div class="model-item">
        <span class="dot dot-gemini"></span>
        <label>Gemini</label>
        <select id="m-gemini">
          <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
          <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
        </select>
      </div>
      <div class="model-item">
        <span class="dot dot-claude"></span>
        <label>Claude</label>
        <select id="m-claude">
          <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
          <option value="claude-opus-4-7">claude-opus-4-7</option>
          <option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option>
        </select>
      </div>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.88rem;color:#444;">
        <input type="checkbox" id="webSearch" style="width:16px;height:16px;cursor:pointer;">
        🔍 Web検索を有効にする
        <span style="font-size:.75rem;color:#888;">（ChatGPT: search-preview / Gemini: Google検索 / Claude: DuckDuckGo）</span>
      </label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.88rem;color:#444;">
        <input type="checkbox" id="xMode" style="width:16px;height:16px;cursor:pointer;">
        𝕏 X投稿モード
        <span style="font-size:.75rem;color:#888;">（返答を280字以内に制約・文字数カウント表示）</span>
      </label>
    </div>

    <div class="actions">
      <button id="sendBtn" onclick="sendAll()">📨 送信（全AI）</button>
      <button id="newBtn" onclick="newSession()">✨ 新しい会話</button>
    </div>
  </div>

  <!-- 結果 -->
  <div class="results">

    <!-- ChatGPT -->
    <div class="card" id="card-chatgpt">
      <div class="card-header">
        <div class="title">
          <span class="dot dot-chatgpt"></span> ChatGPT
          <span class="model-tag" id="tag-chatgpt">gpt-4o</span>
        </div>
        <div class="card-btns">
          <button class="native-btn" id="native-chatgpt" onclick="openNative('chatgpt')" style="display:none">↗ ChatGPTで続ける</button>
          <button class="copy-btn" onclick="copyText('chatgpt')">コピー</button>
        </div>
      </div>
      <div class="card-thread" id="thread-chatgpt">
        <div class="idle-msg">回答がここに表示されます</div>
      </div>
      <div class="char-counter" id="counter-chatgpt">
        <div class="bar-wrap"><div class="bar" id="bar-chatgpt"></div></div>
        <span class="label" id="label-chatgpt"></span>
      </div>
      <div class="card-reply" id="reply-area-chatgpt" style="display:none">
        <textarea id="reply-chatgpt" placeholder="ChatGPTへ追加質問... (Ctrl+Enter で送信)" rows="2"></textarea>
        <button class="reply-send-btn" id="reply-btn-chatgpt" onclick="sendReply('chatgpt')">送信</button>
      </div>
    </div>

    <!-- Gemini -->
    <div class="card" id="card-gemini">
      <div class="card-header">
        <div class="title">
          <span class="dot dot-gemini"></span> Gemini
          <span class="model-tag" id="tag-gemini">gemini-2.5-flash-lite</span>
        </div>
        <div class="card-btns">
          <button class="native-btn" id="native-gemini" onclick="openNative('gemini')" style="display:none">↗ Geminiで続ける</button>
          <button class="copy-btn" onclick="copyText('gemini')">コピー</button>
        </div>
      </div>
      <div class="card-thread" id="thread-gemini">
        <div class="idle-msg">回答がここに表示されます</div>
      </div>
      <div class="char-counter" id="counter-gemini">
        <div class="bar-wrap"><div class="bar" id="bar-gemini"></div></div>
        <span class="label" id="label-gemini"></span>
      </div>
      <div class="card-reply" id="reply-area-gemini" style="display:none">
        <textarea id="reply-gemini" placeholder="Geminiへ追加質問... (Ctrl+Enter で送信)" rows="2"></textarea>
        <button class="reply-send-btn" id="reply-btn-gemini" onclick="sendReply('gemini')">送信</button>
      </div>
    </div>

    <!-- Claude -->
    <div class="card" id="card-claude">
      <div class="card-header">
        <div class="title">
          <span class="dot dot-claude"></span> Claude
          <span class="model-tag" id="tag-claude">claude-sonnet-4-6</span>
        </div>
        <div class="card-btns">
          <button class="native-btn" id="native-claude" onclick="openNative('claude')" style="display:none">↗ Claude.aiで続ける</button>
          <button class="copy-btn" onclick="copyText('claude')">コピー</button>
        </div>
      </div>
      <div class="card-thread" id="thread-claude">
        <div class="idle-msg">回答がここに表示されます</div>
      </div>
      <div class="char-counter" id="counter-claude">
        <div class="bar-wrap"><div class="bar" id="bar-claude"></div></div>
        <span class="label" id="label-claude"></span>
      </div>
      <div class="card-reply" id="reply-area-claude" style="display:none">
        <textarea id="reply-claude" placeholder="Claudeへ追加質問... (Ctrl+Enter で送信)" rows="2"></textarea>
        <button class="reply-send-btn" id="reply-btn-claude" onclick="sendReply('claude')">送信</button>
      </div>
    </div>

  </div>
</div>

<!-- 履歴モーダル -->
<div class="modal-overlay" id="history-modal" onclick="onModalOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h2>📋 会話履歴</h2>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="modal-body" id="history-list"></div>
  </div>
</div>

<script>
  marked.use({ breaks: false });

  // ── 定数 ────────────────────────────────────────────
  const STORAGE_KEY = 'multi_ai_sessions_v1';
  const AI_IDS = ['chatgpt', 'gemini', 'claude'];
  const AI_NAMES = { chatgpt: 'ChatGPT', gemini: 'Gemini', claude: 'Claude' };
  const NATIVE_URLS = {
    chatgpt: 'https://chatgpt.com/?q=',
    gemini:  'https://gemini.google.com/app?q=',
    claude:  null,  // クリップボード + claude.ai/new
  };
  const X_LIMIT = 280;

  // ── 状態 ────────────────────────────────────────────
  let sessions = [];
  let currentSession = null;

  // ── ストレージ ────────────────────────────────────────
  function loadSessions() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      sessions = raw ? JSON.parse(raw) : [];
    } catch { sessions = []; }
  }

  function saveSessions() {
    try {
      if (sessions.length > 50) sessions = sessions.slice(-50);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    } catch(e) { console.warn('localStorage write failed', e); }
  }

  // ── セッション作成 ────────────────────────────────────
  function createNewSession(firstPrompt) {
    currentSession = {
      id: 'sess_' + Date.now(),
      title: firstPrompt.substring(0, 45),
      createdAt: new Date().toISOString(),
      models: {
        chatgpt: document.getElementById('m-chatgpt').value,
        gemini:  document.getElementById('m-gemini').value,
        claude:  document.getElementById('m-claude').value,
      },
      histories: { chatgpt: [], gemini: [], claude: [] }
    };
    sessions.push(currentSession);
  }

  // ── メッセージ操作 ────────────────────────────────────
  function addUserMsg(aiId, content) {
    if (!currentSession) return;
    currentSession.histories[aiId].push({ role: 'user', content });
    renderThread(aiId);
  }

  function addAIMsg(aiId, content, isError = false) {
    if (!currentSession) return;
    currentSession.histories[aiId].push({ role: 'assistant', content, isError });
    renderThread(aiId);
    saveSessions();
    // 返信エリア・ネイティブボタンを表示
    document.getElementById('reply-area-' + aiId).style.display = '';
    document.getElementById('native-' + aiId).style.display = '';
  }

  function setThreadLoading(aiId) {
    const thread = document.getElementById('thread-' + aiId);
    // 既存のspinnerを削除
    thread.querySelector('.msg-loading')?.remove();
    const div = document.createElement('div');
    div.className = 'msg-loading';
    div.innerHTML = '<div class="spinner"></div><span>生成中...</span>';
    thread.appendChild(div);
    thread.scrollTop = thread.scrollHeight;
  }

  function removeThreadLoading(aiId) {
    document.getElementById('thread-' + aiId).querySelector('.msg-loading')?.remove();
  }

  // ── スレッド描画 ──────────────────────────────────────
  function renderThread(aiId) {
    if (!currentSession) return;
    const thread = document.getElementById('thread-' + aiId);
    const history = currentSession.histories[aiId];

    if (history.length === 0) {
      thread.innerHTML = '<div class="idle-msg">回答がここに表示されます</div>';
      return;
    }

    // spinnerを保持したままメッセージを再描画
    const spinner = thread.querySelector('.msg-loading');
    thread.innerHTML = '';

    history.forEach(msg => {
      const div = document.createElement('div');
      div.className = 'msg ' + (msg.role === 'user' ? 'msg-user' : 'msg-ai' + (msg.isError ? ' msg-error' : ''));
      const roleLabel = msg.role === 'user' ? 'あなた' : AI_NAMES[aiId];
      const contentHtml = msg.role === 'user'
        ? escHtml(msg.content)
        : (msg.isError ? escHtml(msg.content) : marked.parse(msg.content));
      div.innerHTML = `<div class="msg-role">${roleLabel}</div><div class="msg-content">${contentHtml}</div>`;
      thread.appendChild(div);
    });

    if (spinner) thread.appendChild(spinner);
    thread.scrollTop = thread.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 全AI送信 ─────────────────────────────────────────
  async function sendAll() {
    const basePrompt = document.getElementById('prompt').value.trim();
    if (!basePrompt) return;

    const xMode = document.getElementById('xMode').checked;
    const prompt = xMode
      ? basePrompt + '\n\n※返答は必ずX（旧Twitter）の投稿制限である280文字以内に収めてください。'
      : basePrompt;
    const webSearch = document.getElementById('webSearch').checked;

    // 新セッション作成
    createNewSession(basePrompt);

    // モデルタグ更新
    AI_IDS.forEach(id => {
      document.getElementById('tag-' + id).textContent = currentSession.models[id];
    });

    // ユーザーメッセージを全AIに追加
    AI_IDS.forEach(id => addUserMsg(id, prompt));
    AI_IDS.forEach(id => setThreadLoading(id));

    document.getElementById('sendBtn').disabled = true;
    document.getElementById('prompt').value = '';

    await Promise.allSettled(AI_IDS.map(async id => {
      try {
        const res = await fetch('/api/ask/' + id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: currentSession.histories[id],
            model: currentSession.models[id],
            web_search: webSearch,
          }),
        });
        const data = await res.json();
        removeThreadLoading(id);
        if (data.error) {
          addAIMsg(id, '❌ ' + data.error, true);
        } else {
          addAIMsg(id, data.text);
          if (xMode) updateCounter(id, data.text);
        }
      } catch(e) {
        removeThreadLoading(id);
        addAIMsg(id, '❌ ' + e.message, true);
      }
    }));

    document.getElementById('sendBtn').disabled = false;
  }

  // ── 個別返信 ─────────────────────────────────────────
  async function sendReply(aiId) {
    if (!currentSession) return;
    const ta = document.getElementById('reply-' + aiId);
    const content = ta.value.trim();
    if (!content) return;

    const xMode = document.getElementById('xMode').checked;
    const prompt = xMode
      ? content + '\n\n※返答は必ずX（旧Twitter）の投稿制限である280文字以内に収めてください。'
      : content;
    const webSearch = document.getElementById('webSearch').checked;

    ta.value = '';
    addUserMsg(aiId, prompt);
    setThreadLoading(aiId);

    const btn = document.getElementById('reply-btn-' + aiId);
    btn.disabled = true;

    try {
      const res = await fetch('/api/ask/' + aiId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: currentSession.histories[aiId],
          model: currentSession.models[aiId],
          web_search: webSearch,
        }),
      });
      const data = await res.json();
      removeThreadLoading(aiId);
      if (data.error) {
        addAIMsg(aiId, '❌ ' + data.error, true);
      } else {
        addAIMsg(aiId, data.text);
        if (xMode) updateCounter(aiId, data.text);
      }
    } catch(e) {
      removeThreadLoading(aiId);
      addAIMsg(aiId, '❌ ' + e.message, true);
    }

    btn.disabled = false;
  }

  // ── ネイティブ継続 ────────────────────────────────────
  function buildContinuationPrompt(aiId) {
    if (!currentSession) return '';
    const history = currentSession.histories[aiId];
    const aiName = AI_NAMES[aiId];
    let text = '以下はこれまでの会話です。内容を踏まえて、続きとして回答してください。\n\n';
    history.forEach(msg => {
      const role = msg.role === 'user' ? 'ユーザー' : aiName;
      text += `【${role}】\n${msg.content}\n\n`;
    });
    text += '---\n上記の続きとして、次の質問があればお願いします。';
    return text;
  }

  function openNative(aiId) {
    const prompt = buildContinuationPrompt(aiId);
    const nativeUrl = NATIVE_URLS[aiId];

    if (nativeUrl) {
      const url = nativeUrl + encodeURIComponent(prompt);
      if (url.length < 8000) {
        window.open(url, '_blank');
      } else {
        // URLが長すぎる場合はクリップボードにコピー
        navigator.clipboard.writeText(prompt).then(() => {
          alert(`会話が長すぎるためURLに埋め込めません。\nクリップボードにコピーしました。\n${AI_NAMES[aiId]}を開いて貼り付けてください。`);
          window.open(nativeUrl.replace(/\?q=$/, ''), '_blank');
        });
      }
    } else {
      // Claude: クリップボード + claude.ai/new を開く
      navigator.clipboard.writeText(prompt).then(() => {
        alert('会話履歴をクリップボードにコピーしました。\nClaude.aiが開きます。画面に貼り付けて続きをどうぞ。');
        window.open('https://claude.ai/new', '_blank');
      }).catch(() => {
        window.open('https://claude.ai/new', '_blank');
      });
    }
  }

  // ── コピー ────────────────────────────────────────────
  function copyText(aiId) {
    if (!currentSession) return;
    const history = currentSession.histories[aiId];
    const lastAI = [...history].reverse().find(m => m.role === 'assistant' && !m.isError);
    if (!lastAI) return;
    navigator.clipboard.writeText(lastAI.content).then(() => {
      const btn = document.querySelector(`#card-${aiId} .copy-btn`);
      const orig = btn.textContent;
      btn.textContent = '✅ コピー済';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  // ── X文字数カウンター ─────────────────────────────────
  function updateCounter(id, text) {
    if (!document.getElementById('xMode').checked) return;
    const len = text.length;
    const pct = Math.min(len / X_LIMIT * 100, 100);
    const over = len > X_LIMIT;
    document.getElementById('counter-' + id).style.display = 'block';
    document.getElementById('bar-' + id).style.width = pct + '%';
    document.getElementById('bar-' + id).style.background = over ? '#dc2626' : pct > 80 ? '#f59e0b' : '#10b981';
    const label = document.getElementById('label-' + id);
    label.className = 'label' + (over ? ' over' : '');
    label.textContent = over ? `⚠️ ${len}字（${len - X_LIMIT}字オーバー）` : `${len} / ${X_LIMIT} 字`;
  }

  // ── 新しい会話 ────────────────────────────────────────
  function newSession() {
    currentSession = null;
    AI_IDS.forEach(id => {
      document.getElementById('thread-' + id).innerHTML = '<div class="idle-msg">回答がここに表示されます</div>';
      document.getElementById('reply-area-' + id).style.display = 'none';
      document.getElementById('native-' + id).style.display = 'none';
      document.getElementById('counter-' + id).style.display = 'none';
      document.getElementById('reply-' + id).value = '';
    });
    document.getElementById('prompt').value = '';
    document.getElementById('prompt').focus();
  }

  // ── 履歴 ─────────────────────────────────────────────
  function showHistory() {
    loadSessions();
    const list = document.getElementById('history-list');

    if (sessions.length === 0) {
      list.innerHTML = '<p style="color:#888;text-align:center;padding:24px;">履歴がありません</p>';
    } else {
      list.innerHTML = '';
      [...sessions].reverse().forEach(sess => {
        const isActive = currentSession?.id === sess.id;
        const div = document.createElement('div');
        div.className = 'session-item' + (isActive ? ' active' : '');

        const d = new Date(sess.createdAt);
        const dateStr = d.toLocaleString('ja-JP', {
          month: 'numeric', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        const turns = Math.max(
          Math.ceil(sess.histories.chatgpt.length / 2),
          Math.ceil(sess.histories.gemini.length / 2),
          Math.ceil(sess.histories.claude.length / 2)
        );
        div.innerHTML = `
          <div class="session-title">${escHtml(sess.title || '(タイトルなし)')}</div>
          <div class="session-meta">${dateStr} · ${turns}往復</div>
        `;
        div.onclick = () => { loadSession(sess.id); closeHistory(); };
        list.appendChild(div);
      });
    }

    document.getElementById('history-modal').classList.add('open');
  }

  function closeHistory() {
    document.getElementById('history-modal').classList.remove('open');
  }

  function onModalOverlayClick(e) {
    if (e.target.id === 'history-modal') closeHistory();
  }

  function loadSession(id) {
    const sess = sessions.find(s => s.id === id);
    if (!sess) return;
    currentSession = sess;

    AI_IDS.forEach(aiId => {
      // モデル選択を復元
      const sel = document.getElementById('m-' + aiId);
      if (sess.models[aiId]) { sel.value = sess.models[aiId]; }
      document.getElementById('tag-' + aiId).textContent = sess.models[aiId] || '';

      renderThread(aiId);

      const hasHistory = sess.histories[aiId].length > 0;
      document.getElementById('reply-area-' + aiId).style.display = hasHistory ? '' : 'none';
      document.getElementById('native-' + aiId).style.display = hasHistory ? '' : 'none';
    });
  }

  // ── キーボードショートカット ──────────────────────────
  // メインテキストエリア: Ctrl/Cmd+Enter で送信
  document.getElementById('prompt').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendAll();
  });

  // 返信テキストエリア: Ctrl/Cmd+Enter で送信
  AI_IDS.forEach(id => {
    document.getElementById('reply-' + id).addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendReply(id);
    });
  });

  // モデル選択と model-tag を同期
  AI_IDS.forEach(id => {
    document.getElementById('m-' + id).addEventListener('change', e => {
      document.getElementById('tag-' + id).textContent = e.target.value;
      if (currentSession) currentSession.models[id] = e.target.value;
    });
  });

  // ── 初期化 ────────────────────────────────────────────
  loadSessions();
</script>
</body>
</html>
